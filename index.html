<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVE Nexo_Arquetipo ARTISTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bronze: {
                            light: '#d4af37',
                            DEFAULT: '#aa7c11',
                            dark: '#5a3d04',
                            metallic: '#8a6421'
                        }
                    },
                    boxShadow: {
                        'metal': '0 10px 25px -5px rgba(0, 0, 0, 0.8), inset 0 2px 4px rgba(255,255,255,0.3)',
                        'inner-dark': 'inset 0 4px 15px rgba(0, 0, 0, 0.95)'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0; background-color: #0b0b0d; font-family: 'Courier New', Courier, monospace;
        }
        .metallic-texture { background: linear-gradient(135deg, #bd9a5f 0%, #5e441b 45%, #a37c3f 70%, #463211 100%); border: 1px solid rgba(212,175,55,0.4); }
        .screen-overlay { background: linear-gradient(180deg, rgba(11,11,13,0.2) 0%, rgba(11,11,13,0.75) 100%); }
        .panel-bunker { background: linear-gradient(180deg, #141519 0%, #0c0d10 100%); border: 2px solid #5e441b; }
    </style>
</head>
<body class="select-none text-gray-200">

    <div id="app-viewport" class="fixed inset-0 w-full h-full p-3 flex items-center justify-center overflow-hidden">
        
        <div class="relative w-full h-full rounded-2xl p-3 metallic-texture shadow-2xl flex items-center justify-center">
            
            <div class="relative w-full h-full bg-[#0d0e12] rounded-xl overflow-hidden flex flex-col justify-between p-4 shadow-inner-dark border border-black/80">
                
                <div id="artist-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700 ease-in-out z-0 scale-100 filter brightness-[0.25] contrast-[1.15]"></div>
                <div class="absolute inset-0 screen-overlay z-10 pointer-events-none"></div>

                <div id="bunker-modal" class="absolute inset-x-4 top-4 bottom-36 panel-bunker rounded-xl z-40 opacity-0 pointer-events-none transition-all duration-300 transform scale-95 flex flex-col shadow-2xl">
                    <div class="flex items-center justify-between border-b border-bronze/20 p-3 bg-black/40">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-bronze animate-ping"></span>
                            <h3 id="modal-title" class="text-bronze-light font-bold uppercase tracking-wider text-xs">SECCIÓN</h3>
                        </div>
                        <button onclick="closeModal()" class="text-stone-400 hover:text-bronze-light transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="modal-content" class="flex-1 p-4 overflow-y-auto text-xs text-stone-300 space-y-3 font-mono">
                        </div>
                </div>

                <div class="relative z-20 w-full text-center mt-4 select-text">
                    <h1 class="text-xl font-black tracking-tighter uppercase text-bronze-light drop-shadow-[0_4px_6px_rgba(0,0,0,0.95)] leading-tight">
                        NAVE Nexo_Arquetipo ARTISTA
                    </h1>
                    <div class="flex items-center justify-center gap-4 mt-2 text-[9px] font-bold text-stone-400">
                        <span class="text-bronze">PROTOTIPO MAESTRO V1.0</span>
                        <span class="h-px w-6 bg-bronze/50"></span>
                        <span class="text-white/90">SISTEMA ACTIVO</span>
                    </div>
                </div>

                <div class="relative z-20 flex flex-row items-center justify-between w-full my-auto">
                    <div class="flex flex-col justify-center items-center gap-3 pl-1">
                        <button onclick="openModal('music')" class="w-14 h-14 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50">
                            <i data-lucide="disc" class="w-6 h-6 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('calendar')" class="w-14 h-14 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50">
                            <i data-lucide="calendar" class="w-6 h-6 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('bio')" class="w-14 h-14 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50">
                            <i data-lucide="user" class="w-6 h-6 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('gallery')" class="w-14 h-14 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50">
                            <i data-lucide="camera" class="w-6 h-6 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('specs')" class="w-14 h-14 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50">
                            <i data-lucide="sliders" class="w-6 h-6 stroke-[2]"></i>
                        </button>
                    </div>
                </div>

                <div class="relative z-20 w-full flex items-end justify-between mt-auto pb-4">
                    
                    <button onclick="openModal('booking')" class="relative w-28 h-28 rounded-full metallic-texture text-black p-1 shadow-metal hover:scale-105 active:scale-95 transition-all flex items-center justify-center border-2 border-black/60 group ml-2">
                        <div class="w-full h-full rounded-full border border-dashed border-black/40 flex flex-col items-center justify-center text-center p-1">
                            <i data-lucide="handshake" class="w-6 h-6 stroke-[2] mb-0.5"></i>
                            <span class="text-[10px] font-black tracking-tighter uppercase leading-none">RESERVA<br>DIRECTA</span>
                        </div>
                    </button>

                    <div class="relative w-24 h-24 rounded-xl overflow-hidden bg-black border-2 border-bronze shadow-metal cursor-pointer mr-2" onclick="toggleVideoMute()">
                        <video id="mini-reactor-video" class="w-full h-full object-cover brightness-90 contrast-115" autoplay loop muted playsinline>
                            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-32128-large.mp4" type="video/mp4">
                        </video>
                        <div id="video-sound-indicator" class="absolute bottom-1 left-1 bg-black/70 px-1 py-0.5 rounded text-[7px] font-bold text-bronze-light flex items-center gap-0.5 border border-bronze/30">
                            <i data-lucide="volume-x" class="w-2 h-2" id="sound-icon"></i>
                            <span id="sound-text">MUTED</span>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        const sectionsData = {
            music: {
                title: "⚙️ MÓDULO DE TRANSMISIÓN",
                html: `<p class="border-b border-stone-800 pb-1">Lista de reproducción:</p>
                       <ul class="space-y-1 pt-1 text-stone-400">
                           <li class="flex justify-between border-b border-stone-900"><span>01. Blues Reactor</span> <span class="text-bronze-light">05:24</span></li>
                           <li class="flex justify-between border-b border-stone-900"><span>02. Eco Metal Sideral</span> <span class="text-bronze-light">04:12</span></li>
                       </ul>`
            },
            calendar: {
                title: "📅 CRONOGRAMA DE GIRA",
                html: `<p class="border-b border-stone-800 pb-1">Fechas programadas:</p>
                       <ul class="space-y-1 pt-1 text-stone-400">
                           <li class="border-b border-stone-900"><span class="text-bronze-light">[25 MAY]</span> Búnker - BS AS</li>
                           <li><span class="text-bronze-light">[12 JUN]</span> Estación - Córdoba</li>
                       </ul>`
            },
            bio: {
                title: "👤 PERFIL DEL ARQUETIPO",
                html: `<p class="text-stone-400 leading-relaxed">Espacio destinado a la historia del artista, sus raíces e influencias en el ecosistema.</p>`
            },
            gallery: {
                title: "🖼️ REGISTRO VISUAL",
                html: `<div class="grid grid-cols-2 gap-1.5 pt-1">
                           <div class="bg-stone-900 h-16 rounded border border-stone-800 flex items-center justify-center text-[9px] text-stone-500">[FOTO_01]</div>
                           <div class="bg-stone-900 h-16 rounded border border-stone-800 flex items-center justify-center text-[9px] text-stone-500">[FOTO_02]</div>
                       </div>`
            },
            specs: {
                title: "🎛️ CONTROLES TÉCNICOS",
                html: `<div class="space-y-2 pt-1">
                           <div><div class="flex justify-between text-[10px] mb-0.5"><span>Ganancia Motor</span><span>85%</span></div><div class="w-full bg-stone-900 h-1.5 rounded-full overflow-hidden border border-stone-800"><div class="bg-bronze h-full" style="width: 85%"></div></div></div>
                       </div>`
            },
            booking: {
                title: "🤝 CONTRATACIÓN DIRECTA",
                html: `<p class="text-bronze-light font-bold mb-1">CONEXIÓN DIRECTA CON MANAGER</p>
                       <p class="text-[11px] text-stone-400">Módulo para envío de propuestas en tiempo real.</p>`
            }
        };

        function toggleVideoMute() {
            const video = document.getElementById('mini-reactor-video');
            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');
            
            if (video.muted) {
                video.muted = false;
                text.innerText = "AUDIO LIVE";
                icon.setAttribute('data-lucide', 'volume-2');
                document.getElementById('video-sound-indicator').classList.add('border-emerald-500/50', 'text-emerald-400');
                document.getElementById('video-sound-indicator').classList.remove('border-bronze/30', 'text-bronze-light');
            } else {
                video.muted = true;
                text.innerText = "MUTED";
                icon.setAttribute('data-lucide', 'volume-x');
                document.getElementById('video-sound-indicator').classList.remove('border-emerald-500/50', 'text-emerald-400');
                document.getElementById('video-sound-indicator').classList.add('border-bronze/30', 'text-bronze-light');
            }
            lucide.createIcons();
        }

        function openModal(section) {
            const modal = document.getElementById('bunker-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            if (sectionsData[section]) {
                title.innerHTML = sectionsData[section].title;
                content.innerHTML = sectionsData[section].html;
                modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                modal.classList.add('opacity-100', 'scale-100');
            }
        }

        function closeModal() {
            const modal = document.getElementById('bunker-modal');
            modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            modal.classList.remove('opacity-100', 'scale-100');
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('artist-bg').style.backgroundImage = `url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1920&auto=format&fit=crop')`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
