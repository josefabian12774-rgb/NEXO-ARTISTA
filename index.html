<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVE Nexo_Arquetipo ARTISTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bronze: {
                            light: '#d4af37',
                            DEFAULT: '#aa7c11',
                            dark: '#5a3d04',
                            metallic: '#8a6421'
                        }
                    },
                    boxShadow: {
                        'metal': '0 10px 25px -5px rgba(0, 0, 0, 0.8), inset 0 2px 4px rgba(255,255,255,0.3)',
                        'inner-dark': 'inset 0 4px 15px rgba(0, 0, 0, 0.95)'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0; background-color: #0b0b0d; font-family: 'Courier New', Courier, monospace;
        }
        .metallic-texture { background: linear-gradient(135deg, #bd9a5f 0%, #5e441b 45%, #a37c3f 70%, #463211 100%); border: 1px solid rgba(212,175,55,0.4); }
        .screen-overlay { background: linear-gradient(180deg, rgba(11,11,13,0.2) 0%, rgba(11,11,13,0.75) 100%); }
        .panel-bunker { background: linear-gradient(180deg, #141519 0%, #0c0d10 100%); border: 2px solid #5e441b; }
    </style>
</head>
<body class="select-none text-gray-200">

    <div id="app-viewport" class="fixed inset-0 w-full h-full p-3 md:p-6 flex items-center justify-center overflow-hidden">
        
        <div class="relative w-full h-full rounded-2xl p-4 metallic-texture shadow-2xl flex items-center justify-center">
            
            <div class="relative w-full h-full bg-[#0d0e12] rounded-xl overflow-hidden flex shadow-inner-dark border border-black/80">
                
                <div id="artist-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700 ease-in-out z-0 scale-100 filter brightness-[0.35] contrast-[1.15]"></div>
                <div class="absolute inset-0 screen-overlay z-10 pointer-events-none"></div>

                <div id="loading-overlay" class="absolute inset-0 bg-[#0c0d11] z-50 flex flex-col items-center justify-center transition-opacity duration-500">
                    <div class="w-12 h-12 border-4 border-bronze animate-spin border-t-transparent rounded-full mb-4"></div>
                    <p class="text-bronze-light tracking-widest text-xs uppercase font-bold">Sincronizando Arquetipo...</p>
                </div>

                <div id="bunker-modal" class="absolute inset-x-4 top-4 bottom-28 md:bottom-4 md:left-28 md:right-8 panel-bunker rounded-xl z-40 opacity-0 pointer-events-none transition-all duration-300 transform scale-95 flex flex-col shadow-2xl">
                    <div class="flex items-center justify-between border-b border-bronze/20 p-4 bg-black/40">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-bronze animate-ping"></span>
                            <h3 id="modal-title" class="text-bronze-light font-bold uppercase tracking-wider text-sm">SECCIÓN</h3>
                        </div>
                        <button onclick="closeModal()" class="text-stone-400 hover:text-bronze-light transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="modal-content" class="flex-1 p-4 md:p-6 overflow-y-auto text-sm text-stone-300 space-y-4 font-mono">
                        </div>
                </div>

                <div class="relative w-full h-full z-20 flex flex-row p-4 md:p-8 justify-between items-center gap-4">
                    
                    <div class="flex flex-col justify-center items-center gap-3 md:gap-4 z-30 h-full pl-2">
                        <button onclick="openModal('music')" class="w-12 h-12 md:w-16 md:h-16 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal hover:brightness-125 active:scale-90 transition-all border border-black/50">
                            <i data-lucide="disc" class="w-6 h-6 md:w-8 md:h-8 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('calendar')" class="w-12 h-12 md:w-16 md:h-16 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal hover:brightness-125 active:scale-90 transition-all border border-black/50">
                            <i data-lucide="calendar" class="w-6 h-6 md:w-8 md:h-8 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('bio')" class="w-12 h-12 md:w-16 md:h-16 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal hover:brightness-125 active:scale-90 transition-all border border-black/50">
                            <i data-lucide="user" class="w-6 h-6 md:w-8 md:h-8 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('gallery')" class="w-12 h-12 md:w-16 md:h-16 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal hover:brightness-125 active:scale-90 transition-all border border-black/50">
                            <i data-lucide="camera" class="w-6 h-6 md:w-8 md:h-8 stroke-[2]"></i>
                        </button>
                        <button onclick="openModal('specs')" class="w-12 h-12 md:w-16 md:h-16 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal hover:brightness-125 active:scale-90 transition-all border border-black/50">
                            <i data-lucide="sliders" class="w-6 h-6 md:w-8 md:h-8 stroke-[2]"></i>
                        </button>
                    </div>

                    <div class="flex-1 h-full flex flex-col justify-between items-end text-right py-4 pr-2">
                        
                        <div class="max-w-xl select-text mt-6">
                            <h1 class="text-xl md:text-5xl font-black tracking-tighter uppercase text-stone-100 drop-shadow-[0_4px_6px_rgba(0,0,0,0.95)] leading-tight">
                                NAVE Nexo_Arquetipo ARTISTA
                            </h1>
                            <div class="flex items-center justify-end gap-3 mt-2 text-bronze-light tracking-widest text-[9px] md:text-xs font-bold">
                                <span>PROTOTIPO MAESTRO V1.0</span>
                                <span class="h-px w-6 bg-bronze"></span>
                                <span class="text-white/90">SISTEMA ACTIVO</span>
                            </div>
                        </div>

                        <div class="w-full flex flex-col sm:flex-row items-center justify-end gap-6 mt-auto">
                            
                            <div class="hidden md:flex items-center gap-3 bg-black/85 border border-bronze/30 p-2 rounded-xl shadow-2xl backdrop-blur-md w-64 border-l-4 border-l-bronze">
                                <div class="relative w-16 h-12 bg-stone-900 rounded-lg overflow-hidden flex items-center justify-center border border-stone-800">
                                    <i data-lucide="play" class="w-5 h-5 text-bronze-light fill-bronze-light animate-pulse"></i>
                                </div>
                                <div class="flex-1 text-left overflow-hidden">
                                    <p class="text-[9px] text-bronze-light font-bold tracking-wider uppercase">Frecuencia Base</p>
                                    <p class="text-xs truncate font-mono text-stone-300">Arquetipo Reactor Audio</p>
                                </div>
                            </div>

                            <button onclick="openModal('booking')" class="relative w-24 h-24 md:w-36 md:h-36 rounded-full metallic-texture text-black p-1 shadow-metal hover:scale-105 active:scale-95 transition-all flex items-center justify-center border-2 border-black/60 group z-30 mb-2 sm:mb-0">
                                <div class="w-full h-full rounded-full border border-dashed border-black/40 flex flex-col items-center justify-center p-2 text-center">
                                    <i data-lucide="handshake" class="w-6 h-6 md:w-9 md:h-9 stroke-[2] mb-1"></i>
                                    <span class="text-[10px] md:text-xs font-black tracking-tighter uppercase leading-none">RESERVA<br>DIRECTA</span>
                                </div>
                            </button>

                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        // Contenido de las secciones
        const sectionsData = {
            music: {
                title: "⚙️ MÓDULO DE TRANSMISIÓN (MÚSICA)",
                html: `<p class="border-b border-stone-800 pb-2">Lista de reproducción cargada en el núcleo del arquetipo:</p>
                       <ul class="space-y-2 pt-2">
                           <li class="flex justify-between border-b border-stone-900 pb-1"><span>01. Blues Reactor (Live)</span> <span class="text-bronze-light">05:24</span></li>
                           <li class="flex justify-between border-b border-stone-900 pb-1"><span>02. Eco de Metal Sideral</span> <span class="text-bronze-light">04:12</span></li>
                           <li class="flex justify-between"><span>03. Frecuencia Pom-Pom</span> <span class="text-bronze-light">03:45</span></li>
                       </ul>`
            },
            calendar: {
                title: "📅 CRONOGRAMA DE DESPLIEGUE (GIRA)",
                html: `<p class="border-b border-stone-800 pb-2">Fechas programadas de sincronización:</p>
                       <ul class="space-y-2 pt-2">
                           <li class="border-b border-stone-900 pb-1"><span class="text-bronze-light">[25 MAY]</span> Búnker Central - Buenos Aires</li>
                           <li class="border-b border-stone-900 pb-1"><span class="text-bronze-light">[12 JUN]</span> Estación Norte - Córdoba</li>
                           <li><span class="text-bronze-light">[04 JUL]</span> Teatro del Alma - Mendoza</li>
                       </ul>`
            },
            bio: {
                title: "👤 PERFIL DEL ARQUETIPO (BIOGRAFÍA)",
                html: `<p>Identidad conceptual de la NAVE Nexo_Arquetipo:</p>
                       <p class="text-stone-400 pt-2 leading-relaxed">Este espacio está destinado a la historia del artista, sus raíces, influencias musicales y el manifiesto sonoro que define su paso por el ecosistema.</p>`
            },
            gallery: {
                title: "🖼️ REGISTRO VISUAL (GALERÍA)",
                html: `<p>Módulo de renderizado de capturas en vivo.</p>
                       <div class="grid grid-cols-2 gap-2 pt-2">
                           <div class="bg-stone-900 h-24 rounded border border-stone-800 flex items-center justify-center text-[10px] text-stone-500">[FOTO_01.JPG]</div>
                           <div class="bg-stone-900 h-24 rounded border border-stone-800 flex items-center justify-center text-[10px] text-stone-500">[FOTO_02.JPG]</div>
                       </div>`
            },
            specs: {
                title: "🎛️ CONTROLES TÉCNICOS",
                html: `<p>Estado de los módulos estructurales:</p>
                       <div class="space-y-3 pt-2">
                           <div><div class="flex justify-between text-xs mb-1"><span>Ganancia del Motor</span><span>85%</span></div><div class="w-full bg-stone-900 h-2 rounded-full overflow-hidden border border-stone-800"><div class="bg-bronze h-full" style="width: 85%"></div></div></div>
                           <div><div class="flex justify-between text-xs mb-1"><span>Compresión JSONB</span><span>100%</span></div><div class="w-full bg-stone-900 h-2 rounded-full overflow-hidden border border-stone-800"><div class="bg-bronze h-full" style="width: 100%"></div></div></div>
                       </div>`
            },
            booking: {
                title: "🤝 TERMINAL DE CONTRATACIÓN DIRECTA",
                html: `<p class="text-bronze-light font-bold mb-2">CONEXIÓN DIRECTA CON EL MANAGER</p>
                       <p class="text-xs text-stone-400">Módulo exclusivo para el envío seguro de propuestas y fechas libres en tiempo real.</p>`
            }
        };

        function openModal(section) {
            const modal = document.getElementById('bunker-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            if (sectionsData[section]) {
                title.innerHTML = sectionsData[section].title;
                content.innerHTML = sectionsData[section].html;
                
                modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                modal.classList.add('opacity-100', 'scale-100');
            }
        }

        function closeModal() {
            const modal = document.getElementById('bunker-modal');
            modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            modal.classList.remove('opacity-100', 'scale-100');
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('artist-bg').style.backgroundImage = `url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1920&auto=format&fit=crop')`;
            lucide.createIcons();
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
            }, 400);
        });
    </script>
</body>
</html>
