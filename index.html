<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO-ARTISTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0d; color: #d4af37; font-family: 'Courier New', Courier, monospace; }
        .nave-box { border: 2px solid #5e441b; background: linear-gradient(180deg, #141519 0%, #0c0d10 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-4">

    <div class="nave-box w-full max-w-md p-6 rounded-xl shadow-2xl text-center">
        <h1 class="text-2xl font-black uppercase tracking-tighter mb-4 text-yellow-600">NEXO-ARTISTA</h1>
        
        <div class="overflow-hidden rounded-lg border border-yellow-700 mb-6">
            <video width="100%" autoplay loop muted playsinline>
                <source src="Joel-video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="bg-yellow-700 text-black font-bold py-2 px-4 rounded">MÚSICA</button>
            <button class="bg-yellow-700 text-black font-bold py-2 px-4 rounded">GIRA</button>
            <button class="bg-yellow-700 text-black font-bold py-2 px-4 rounded">BIO</button>
            <button class="bg-yellow-700 text-black font-bold py-2 px-4 rounded">RESERVA</button>
        </div>
    </div>

</body>
</html>
