                        <div class="w-full flex flex-col sm:flex-row items-center justify-end gap-6 mt-auto">
                            
                            <div class="hidden md:flex items-center gap-3 bg-black/85 border border-bronze/30 p-2 rounded-xl shadow-2xl backdrop-blur-md w-64 border-l-4 border-l-bronze">

                            <button onclick="openModal('booking')" class="relative w-28 h-28 md:w-36 md:h-36 rounded-full metallic-texture text-black p-1 shadow-metal hover:scale-105 active:scale-95 transition-all flex items-center justify-center border-2 border-black/60 group z-30">
                                <div class="w-full h-full rounded-full border border-dashed border-black/40 flex flex-col items-center justify-center p-2 text-center">

    <script>
        // Data del Contenido para las secciones del Prototipo Maestro
        const sectionsData = {
            music: {
                title: "⚙️ MÓDULO DE TRANSMISIÓN (MÚSICA)",
                html: `<p class="border-b border-stone-800 pb-2">Lista de reproducción cargada en el núcleo del arquetipo:</p>
                       <ul class="space-y-2 pt-2">
                           <li class="flex justify-between border-b border-stone-900 pb-1"><span>01. Blues Reactor (Live)</span> <span class="text-bronze-light">05:24</span></li>
                           <li class="flex justify-between border-b border-stone-900 pb-1"><span>02. Eco de Metal Sideral</span> <span class="text-bronze-light">04:12</span></li>
                           <li class="flex justify-between"><span>03. Frecuencia Pom-Pom</span> <span class="text-bronze-light">03:45</span></li>
                       </ul>`
            },
            calendar: {
                title: "📅 CRONOGRAMA DE DESPLIEGUE (GIRA)",
                html: `<p class="border-b border-stone-800 pb-2">Fechas programadas de sincronización:</p>
                       <ul class="space-y-2 pt-2">
                           <li class="border-b border-stone-900 pb-1"><span class="text-bronze-light">[25 MAY]</span> Búnker Central - Buenos Aires</li>
                           <li class="border-b border-stone-900 pb-1"><span class="text-bronze-light">[12 JUN]</span> Estación Norte - Córdoba</li>
                           <li><span class="text-bronze-light">[04 JUL]</span> Teatro del Alma - Mendoza</li>
                       </ul>`
            },
            gallery: {
                title: "🖼️ REGISTRO VISUAL (GALERÍA)",
                html: `<p>Módulo de renderizado de capturas del artista en vivo.</p>
                       <div class="grid grid-cols-2 gap-2 pt-2">
                           <div class="bg-stone-900 h-24 rounded border border-stone-800 flex items-center justify-center text-[10px] text-stone-500">[FOTO_01.JPG]</div>
                           <div class="bg-stone-900 h-24 rounded border border-stone-800 flex items-center justify-center text-[10px] text-stone-500">[FOTO_02.JPG]</div>
                       </div>`
            },
            specs: {
                title: "🎛️ CONTROLES TÉCNICOS DE LA NAVE",
                html: `<p>Estado de los módulos del prototipo:</p>
                       <div class="space-y-3 pt-2">
                           <div><div class="flex justify-between text-xs mb-1"><span>Ganancia del Motor</span><span>85%</span></div><div class="w-full bg-stone-900 h-2 rounded-full overflow-hidden border border-stone-800"><div class="bg-bronze h-full" style="width: 85%"></div></div></div>
                           <div><div class="flex justify-between text-xs mb-1"><span>Compresión de Datos JSONB</span><span>100%</span></div><div class="w-full bg-stone-900 h-2 rounded-full overflow-hidden border border-stone-800"><div class="bg-bronze h-full" style="width: 100%"></div></div></div>
                       </div>`
            },
            ecosystem: {
                title: "🌿 SCONEXIÓN AL ECOSISTEMA NEXO",
                html: `<p>Mapeo de arquitectura Multi-Inquilino:</p>
                       <p class="text-stone-400 text-xs pt-2">Este archivo actúa como molde general. Los datos específicos de cada nuevo artista se inyectarán de forma aislada sin tocar este esqueleto estructural.</p>`
            },
            booking: {
                title: "🤝 TERMINAL DE CONTRATACIÓN DIRECTA",
                html: `<p class="text-bronze-light font-bold">CONEXIÓN DIRECTA CON EL MANAGER</p>
                       <p class="text-xs">Módulo prototipo para el envío seguro de propuestas presupuestarias en tiempo real.</p>`
            }
        };

        // Funciones de control de la interfaz flotante
        function openModal(section) {
            const modal = document.getElementById('bunker-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            if (sectionsData[section]) {
                title.innerHTML = sectionsData[section].title;
                content.innerHTML = sectionsData[section].html;
                
                modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                modal.classList.add('opacity-100', 'scale-100');
            }
        }

        function closeModal() {
            const modal = document.getElementById('bunker-modal');
            modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            modal.classList.remove('opacity-100', 'scale-100');
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Fondo por defecto para el prototipo
            document.getElementById('artist-bg').style.backgroundImage = `url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1920&auto=format&fit=crop')`;

            lucide.createIcons();

            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.classList.add('opacity-0', 'pointer-events-none');
            }, 400);
        });
    </script>
</body>

                             <div class="relative w-20 h-12 bg-stone-900 rounded overflow-hidden flex items-center justify-center border border-stone-700">

                                </div>

                                    <p id="track-name" class="text-xs truncate font-mono text-stone-400">Cargando track...</p>

                            <button onclick="handleNav('booking')" class="relative w-32 h-32 md:w-40 md:h-40 rounded-full metallic-texture text-black p-1 shadow-metal hover:scale-105 active:scale-95 transition-all flex items-center justify-center border-2 border-black/50 group z-30">
                                <div class="w-full h-full rounded-full border border-dashed border-black/40 flex flex-col items-center justify-center p-2 text-center">
                                    <i data-lucide="handshake" class="w-8 h-8 md:w-10 md:h-10 stroke-[1.5] mb-1"></i>

    <script>
        // MOCK DATA: Representación exacta de la estructura de la base de datos 'Nave-Pom-Pom'
        const mockDatabase = {
            naves: [
                {
                    id: 1,
                    perfil_slug: "elias-blues",
                    content: {
                        titulo_principal: "El Sonido del Alma: Elias' Blues Reactor",
                        subtitulo: "Electronic Press Kit",
                        bg_image: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1920&auto=format&fit=crop", // Foto conceptual de blues/concierto en búnker
                        live_track_name: "Blues Reactor - Live Session 2026",
                        contacto_booking: "booking@eliasblues.com"
                    }
                }
            ]
        };

        // Resolución del tenant mediante captura del Slug en URL
        function getTenantSlug() {
            const params = new URLSearchParams(window.location.search);
            // Si no viene por parámetro (?artist=elias-blues), defaultea al exigido por la directiva
            return params.get('artist') || 'elias-blues';
        }

        // Inicialización y Mapeo del Frontend
        document.addEventListener("DOMContentLoaded", () => {
            const currentSlug = getTenantSlug();
            
            // Simulación de consulta: SELECT * FROM naves WHERE perfil_slug = currentSlug LIMIT 1
            const naveData = mockDatabase.naves.find(nave => nave.perfil_slug === currentSlug);

            if (naveData) {
                // Desestructuración segura del objeto JSONB 'content'
                const { titulo_principal, subtitulo, bg_image, live_track_name } = naveData.content;

                // Inyección Directa en el Frontend (Cero data estática)
                document.getElementById('artist-title').innerText = titulo_principal;
                document.getElementById('artist-subtitle').innerText = subtitulo;
                document.getElementById('artist-bg').style.backgroundImage = `url('${bg_image}')`;
                document.getElementById('track-name').innerText = live_track_name;
            } else {
                // Fallback elegante en caso de inquilino inexistente
                document.getElementById('artist-title').innerText = "Nave No Identificada";
                document.getElementById('artist-subtitle').innerText = "404 Epk System";
            }

            // Inicializar los íconos de Lucide incorporados dinámicamente
            lucide.createIcons();

            // Apagar la pantalla de carga con delay controlado para transición suave
            setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }, 600);
        });

        // Controlador de Navegación/Acciones de la botonera metálica
        function handleNav(section) {
            console.log(`Ejecutando ruteo interno para sección: ${section}`);
            // Aquí se conectan los disparadores de modales o vistas internas manteniendo el Anti-Scroll
            alert(`Navegando a: ${section.toUpperCase()} (Mantenimiento de arquitectura App-Like de pantalla fija)`);
        }
    </script>
</body>
</html>
