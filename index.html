<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAVE Nexo_Arquetipo ARTISTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bronze: {
                            light: '#d4af37',
                            DEFAULT: '#aa7c11',
                            dark: '#5a3d04',
                            metallic: '#8a6421'
                        }
                    },
                    boxShadow: {
                        'metal': '0 10px 25px -5px rgba(0, 0, 0, 0.8), inset 0 2px 4px rgba(255,255,255,0.3)',
                        'inner-dark': 'inset 0 4px 15px rgba(0, 0, 0, 0.95)'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0; background-color: #0b0b0d; font-family: 'Courier New', Courier, monospace; }
        .metallic-texture { background: linear-gradient(135deg, #bd9a5f 0%, #5e441b 45%, #a37c3f 70%, #463211 100%); border: 1px solid rgba(212,175,55,0.4); }
        .screen-overlay { background: linear-gradient(180deg, rgba(11,11,13,0.2) 0%, rgba(11,11,13,0.75) 100%); }
        .panel-bunker { background: linear-gradient(180deg, #141519 0%, #0c0d10 100%); border: 2px solid #5e441b; }
    </style>
</head>
<body class="select-none text-gray-200">

    <div id="app-viewport" class="fixed inset-0 w-full h-full p-3 flex items-center justify-center overflow-hidden">
        <div class="relative w-full h-full rounded-2xl p-3 metallic-texture shadow-2xl flex items-center justify-center">
            <div class="relative w-full h-full bg-[#0d0e12] rounded-xl overflow-hidden flex flex-col justify-between p-4 shadow-inner-dark border border-black/80">
                
                <div id="artist-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700 ease-in-out z-0 scale-100 filter brightness-[0.25] contrast-[1.15]"></div>
                <div class="absolute inset-0 screen-overlay z-10 pointer-events-none"></div>

                <div id="bunker-modal" class="absolute inset-x-4 top-4 bottom-32 panel-bunker rounded-xl z-40 opacity-0 pointer-events-none transition-all duration-300 transform scale-95 flex flex-col shadow-2xl">
                    <div class="flex items-center justify-between border-b border-bronze/20 p-3 bg-black/40">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-bronze animate-ping"></span>
                            <h3 id="modal-title" class="text-bronze-light font-bold uppercase tracking-wider text-xs">SECCIÓN</h3>
                        </div>
                        <button onclick="closeModal()" class="text-stone-400 hover:text-bronze-light transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div id="modal-content" class="flex-1 p-4 overflow-y-auto text-xs text-stone-300 space-y-3 font-mono"></div>
                </div>

                <div class="relative z-20 w-full text-right mt-2">
                    <h1 class="text-xl font-black tracking-tighter uppercase text-bronze-light drop-shadow-[0_4px_6px_rgba(0,0,0,0.95)] leading-tight">NAVE Nexo_Arquetipo ARTISTA</h1>
                    <div class="flex items-center justify-end gap-2 mt-1 text-[9px] font-bold text-stone-400">
                        <span class="text-bronze">PROTOTIPO MAESTRO V1.0</span>
                        <span class="h-px w-4 bg-bronze/50"></span>
                        <span class="text-white/90">SISTEMA ACTIVO</span>
                    </div>
                </div>

                <div class="relative z-20 flex flex-col justify-center items-start gap-3 pl-1 my-auto">
                    <button onclick="openModal('music')" class="w-11 h-11 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50"><i data-lucide="disc" class="w-5 h-5 stroke-[2]"></i></button>
                    <button onclick="openModal('calendar')" class="w-11 h-11 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50"><i data-lucide="calendar" class="w-5 h-5 stroke-[2]"></i></button>
                    <button onclick="openModal('bio')" class="w-11 h-11 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50"><i data-lucide="user" class="w-5 h-5 stroke-[2]"></i></button>
                    <button onclick="openModal('gallery')" class="w-11 h-11 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50"><i data-lucide="camera" class="w-5 h-5 stroke-[2]"></i></button>
                    <button onclick="openModal('specs')" class="w-11 h-11 rounded-full metallic-texture text-black flex items-center justify-center shadow-metal active:scale-90 transition-all border border-black/50"><i data-lucide="sliders" class="w-5 h-5 stroke-[2]"></i></button>
                </div>

                <div class="relative z-20 w-full flex items-end justify-between mt-auto pb-2">
                    <button onclick="openModal('booking')" class="w-24 h-24 rounded-full metallic-texture text-black p-1 shadow-metal hover:scale-105 active:scale-95 transition-all flex items-center justify-center border-2 border-black/60 ml-2">
                        <div class="w-full h-full rounded-full border border-dashed border-black/40 flex flex-col items-center justify-center text-center p-1">
                            <i data-lucide="handshake" class="w-5 h-5 stroke-[2] mb-0.5"></i>
                            <span class="text-[9px] font-black tracking-tighter uppercase leading-none">RESERVA<br>DIRECTA</span>
                        </div>
                    </button>
                    <div class="relative w-24 h-24 rounded-xl overflow-hidden bg-black border-2 border-bronze shadow-metal cursor-pointer mr-2" onclick="toggleVideoMute()">
                        <video id="mini-reactor-video" class="w-full h-full object-cover brightness-90 contrast-115" autoplay loop muted playsinline>
                            <source src="Joel-video.mp4" type="video/mp4">
                        </video>
                        <div id="video-sound-indicator" class="absolute bottom-1 left-1 bg-black/70 px-1 py-0.5 rounded text-[7px] font-bold text-bronze-light flex items-center gap-0.5 border border-bronze/30">
                            <i data-lucide="volume-x" class="w-2 h-2" id="sound-icon"></i>
                            <span id="sound-text">MUTED</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sectionsData = {
            music: { title: "⚙️ MÓDULO DE TRANSMISIÓN", html: `<p>Módulo de audio activo.</p>` },
            calendar: { title: "📅 CRONOGRAMA", html: `<p>Fechas de despliegue.</p>` },
            bio: { title: "👤 PERFIL", html: `<p>Información del Arquetipo.</p>` },
            gallery: { title: "🖼️ REGISTRO", html: `<p>Archivo visual.</p>` },
            specs: { title: "🎛️ CONTROLES", html: `<p>Parámetros del sistema.</p>` },
            booking: { title: "🤝 CONTRATACIÓN", html: `<p>Propuestas directas.</p>` }
        };

        function toggleVideoMute() {
            const video = document.getElementById('mini-reactor-video');
            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');
            video.muted = !video.muted;
            text.innerText = video.muted ? "MUTED" : "AUDIO LIVE";
            icon.setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        function openModal(s) {
            document.getElementById('modal-title').innerHTML = sectionsData[s].title;
            document.getElementById('modal-content').innerHTML = sectionsData[s].html;
            document.getElementById('bunker-modal').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('bunker-modal').classList.remove('pointer-events-none', 'scale-95');
        }

        function closeModal() {
            document.getElementById('bunker-modal').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('bunker-modal').classList.add('pointer-events-none', 'scale-95');
        }

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            document.getElementById('artist-bg').style.backgroundImage = `url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1920&auto=format&fit=crop')`;
        });
    </script>
</body>
</html>
